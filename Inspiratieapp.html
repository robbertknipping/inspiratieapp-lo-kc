<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LO Inspiratie App - Kempenhorst College</title>
    
    <!-- Chosen Palette: Kempenhorst Huisstijl (Donkerblauw #1C2150, Blauw #3A1FEB, Roodbruin #BF5C62, Roze #F5DBEC) -->
    <!-- Application Structure Plan: Een Single Page Application (SPA) gericht op gebruiksvriendelijkheid in de gymzaal en op kantoor. De structuur bestaat uit een realtime tijdlijn, een interactief formulier met geavanceerde velden (zoals een custom duration picker) en een analyse-dashboard. De navigatie is gecentreerd rondom kerndoelen en secundaire tags. -->
    <!-- Visualization & Content Choices: Dashboard -> Analyse van content-spreiding -> Chart.js Doughnut -> Interactie: Detailweergave bij klik -> Justificatie: Helpt de vakgroep te zien waar de meeste inspiratie ligt. Methode: Chart.js Canvas (NO SVG). -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kcDark: '#1C2150',
                        kcBlue: '#3A1FEB',
                        kcRed: '#BF5C62',
                        kcPink: '#F5DBEC',
                        kcLight: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Work Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Work Sans', sans-serif; }
        
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .u-icon { font-style: normal; font-size: 1.1em; line-height: 1; display: inline-block; }
    </style>
</head>
<body class="text-kcDark antialiased pb-24 md:pb-0">

    <!-- HEADER -->
    <header class="bg-white sticky top-0 z-50 shadow-sm border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-3xl font-black leading-none text-kcDark tracking-tighter">ke</div>
                <div class="border-l-2 border-kcPink pl-3">
                    <h1 class="text-sm font-bold leading-tight">kempenhorst</h1>
                    <h2 class="text-sm font-bold leading-tight">college <span class="text-kcBlue font-medium ml-1">| LO Inspiratie</span></h2>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="userNameInput" placeholder="Jouw naam" class="text-right text-sm font-medium text-kcDark bg-transparent border-b border-transparent focus:border-kcBlue focus:outline-none w-24 transition-colors" value="Collega">
                <div class="w-8 h-8 rounded-full bg-kcDark text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">C</div>
            </div>
        </div>
        
        <div class="max-w-4xl mx-auto px-4 mt-2">
            <div class="flex overflow-x-auto hide-scrollbar gap-6 border-b border-slate-200">
                <button class="nav-tab active border-b-2 border-kcBlue text-kcBlue font-bold py-2 px-1" onclick="switchTab('app-tab', this)">Tijdlijn</button>
                <button class="nav-tab text-slate-500 hover:text-kcDark font-medium py-2 px-1" onclick="switchTab('stats-tab', this)">Inzichten</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">

        <!-- TAB 1: TIJDLIJN -->
        <section id="app-tab" class="tab-content active space-y-6">
            
            <!-- Zoek & Filter -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 opacity-50"><span class="u-icon">🔍</span></span>
                    <input type="text" id="searchInput" placeholder="Zoek ideeën..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-kcBlue shadow-sm text-kcDark" oninput="renderPosts()">
                </div>
                <button id="bookmarkFilterBtn" onclick="toggleBookmarkFilter()" class="flex items-center justify-center px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-500 hover:bg-kcPink transition-colors shadow-sm">
                    <span class="u-icon">🔖</span>
                </button>
            </div>

            <!-- Twee rijen met Tags -->
            <div class="space-y-4 bg-white/50 p-3 rounded-2xl border border-slate-100">
                <!-- Rij 1: Kerndoelen -->
                <div class="flex flex-col gap-1.5">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Kerndoelen LO:</span>
                    <div id="kerndoelen-container" class="flex overflow-x-auto gap-2 hide-scrollbar items-center">
                        <!-- Wordt gevuld via JS -->
                    </div>
                </div>
                <!-- Rij 2: Idee Tags -->
                <div class="flex flex-col gap-1.5" id="idee-tags-section">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Vrije Tags:</span>
                    <div id="idee-tags-container" class="flex overflow-x-auto gap-2 hide-scrollbar items-center">
                        <!-- Wordt gevuld via JS -->
                    </div>
                </div>
            </div>

            <div id="feed-container" class="space-y-6">
                <!-- Berichten verschijnen hier -->
            </div>
        </section>

        <!-- TAB 2: INZICHTEN -->
        <section id="stats-tab" class="tab-content">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold text-center mb-6">Verdeling van thema's</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </section>

    </main>

    <!-- FLOATING ACTION BUTTON -->
    <button onclick="toggleModal()" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 w-14 h-14 bg-kcRed text-white rounded-full shadow-lg hover:scale-105 transition-all flex items-center justify-center z-40 text-2xl" id="fabBtn">
        <span class="u-icon">➕</span>
    </button>

    <!-- MODAL -->
    <div id="postModal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-kcDark/60 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-4 border-b border-slate-100">
                <h2 class="text-lg font-bold text-kcDark">Inspiratie Delen</h2>
                <button onclick="toggleModal()" class="p-1 hover:bg-kcPink hover:text-kcRed rounded-full text-slate-500 transition-colors"><span class="u-icon">❌</span></button>
            </div>

            <div class="p-4 overflow-y-auto flex-1">
                <form id="newPostForm" class="space-y-6">
                    <!-- Basis Info -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-1">Titel <span class="text-red-500">*</span></label>
                            <input type="text" id="postTitle" required class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-kcBlue outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-2">Kerndoelen (Meerdere selecteren mogelijk)</label>
                            <div id="modalKerndoelen" class="flex flex-wrap gap-2 mb-4"></div>
                            
                            <label class="block text-sm font-medium text-kcDark mb-1">Extra Tag toevoegen</label>
                            <div class="flex gap-2 mb-2">
                                <input type="text" id="newTagInput" placeholder="Bv. Softbal..." class="flex-1 p-2 rounded-lg border border-slate-300 outline-none text-sm">
                                <button type="button" onclick="addNewTag()" class="px-3 py-1 bg-slate-100 rounded-lg text-xs font-bold hover:bg-slate-200">Toevoegen</button>
                            </div>
                            <div id="modalExtraTags" class="flex flex-wrap gap-2"></div>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Praktische Info -->
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-kcBlue uppercase tracking-wide">Praktische Info</h3>
                        
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="block text-sm font-medium text-kcDark mb-2">Tijdsduur</label>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <button type="button" onclick="setPresetDuration('15 min')" class="dur-preset px-3 py-1.5 rounded-full border border-slate-300 text-xs hover:bg-kcPink">15m</button>
                                <button type="button" onclick="setPresetDuration('30 min')" class="dur-preset px-3 py-1.5 rounded-full border border-slate-300 text-xs hover:bg-kcPink">30m</button>
                                <button type="button" onclick="setPresetDuration('45 min')" class="dur-preset px-3 py-1.5 rounded-full border border-slate-300 text-xs hover:bg-kcPink">45m</button>
                                <button type="button" onclick="setPresetDuration('60 min')" class="dur-preset px-3 py-1.5 rounded-full border border-slate-300 text-xs hover:bg-kcPink">60m</button>
                                <button type="button" onclick="setPresetDuration('Hele les')" class="dur-preset px-3 py-1.5 rounded-full border border-slate-300 text-xs hover:bg-kcPink">Hele les</button>
                            </div>
                            <div class="flex items-center gap-3">
                                <button type="button" onclick="adjustDuration(-5)" class="w-8 h-8 bg-white border border-slate-300 rounded-full font-bold shadow-sm">-</button>
                                <input type="text" id="postDuration" readonly class="w-24 text-center p-1.5 rounded-lg border border-slate-300 bg-white font-bold" value="15 min">
                                <button type="button" onclick="adjustDuration(5)" class="w-8 h-8 bg-white border border-slate-300 rounded-full font-bold shadow-sm">+</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-kcDark mb-1">Intensiteit</label>
                                <select id="postIntensity" class="w-full p-2.5 rounded-lg border border-slate-300 outline-none bg-white">
                                    <option value="Laag">Laag</option><option value="Gemiddeld" selected>Gemiddeld</option><option value="Hoog">Hoog</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-kcDark mb-1">Materialen</label>
                                <input type="text" id="postMaterials" placeholder="Bv. 4 ballen, 1 kist" class="w-full p-2.5 rounded-lg border border-slate-300 outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-2">Doelgroep (Optioneel)</label>
                            <div id="target-groups-container" class="flex flex-wrap gap-2">
                                <!-- Vinkjes -->
                            </div>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Inhoud -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-1">Uitleg / Methode <span class="text-red-500">*</span></label>
                            <textarea id="postContent" required rows="5" class="w-full p-2.5 rounded-lg border border-slate-300 outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-xl space-y-4 border border-slate-100">
                            <label class="block text-sm font-bold text-kcBlue uppercase tracking-wide">Didactiek & Veiligheid</label>
                            <input type="text" id="postEasier" placeholder="📉 Makkelijker maken..." class="w-full p-2.5 rounded-lg border border-green-100 outline-none text-sm">
                            <input type="text" id="postHarder" placeholder="📈 Zwaarder maken..." class="w-full p-2.5 rounded-lg border border-red-100 outline-none text-sm">
                            <input type="text" id="postSafety" placeholder="⚠️ Veiligheidspunten..." class="w-full p-2.5 rounded-lg border border-orange-100 outline-none text-sm">
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Bijlagen & Links -->
                    <div class="space-y-4">
                        <h3 class="text-sm font-bold text-kcBlue uppercase tracking-wide">Bijlagen & Links</h3>
                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-1">Internet/YouTube Link</label>
                            <input type="url" id="postLink" placeholder="https://www.youtube.com/watch?v=..." class="w-full p-2.5 rounded-lg border border-slate-300 outline-none bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-kcDark mb-1">Foto's / Documenten</label>
                            <input type="file" multiple id="postFiles" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-kcPink file:text-kcRed hover:file:bg-kcPink/80">
                        </div>
                    </div>
                </form>
            </div>

            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                <button type="button" onclick="toggleModal()" class="px-5 py-2.5 rounded-xl text-kcDark font-medium hover:bg-slate-200 transition-colors">Annuleren</button>
                <button type="button" onclick="submitPost()" class="px-5 py-2.5 rounded-xl bg-kcBlue text-white font-medium shadow-sm hover:bg-kcDark transition-colors">Plaatsen</button>
            </div>
        </div>
    </div>

    <!-- CORE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // VUL HIER JOUW FIREBASE CONFIG IN
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let db = null;
        let useFirebase = false;

        if (firebaseConfig.apiKey !== "") {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    window.appState.currentUser = u;
                    if(u) {
                        onSnapshot(collection(db, "posts"), (snap) => {
                            const posts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            window.appState.posts = posts.sort((a,b) => b.createdAt - a.createdAt);
                            window.renderPosts();
                        });
                        onSnapshot(collection(db, "users", u.uid, "bookmarks"), (snap) => {
                            window.appState.bookmarks = snap.docs.map(d => d.id);
                            window.renderPosts();
                        });
                    }
                });
                useFirebase = true;
            } catch (e) { console.error(e); }
        }

        window.savePostToDb = async (post) => {
            if(useFirebase && db) await addDoc(collection(db, "posts"), post);
            else {
                post.id = Date.now().toString();
                window.appState.posts.unshift(post);
                localStorage.setItem('lo_posts', JSON.stringify(window.appState.posts));
                window.renderPosts();
            }
        };

        window.toggleBookmarkInDb = async (pid) => {
            if(useFirebase && window.appState.currentUser) {
                const ref = doc(db, "users", window.appState.currentUser.uid, "bookmarks", pid);
                if(window.appState.bookmarks.includes(pid)) await deleteDoc(ref);
                else await setDoc(ref, {at: Date.now()});
            } else {
                const idx = window.appState.bookmarks.indexOf(pid);
                if(idx > -1) window.appState.bookmarks.splice(idx, 1);
                else window.appState.bookmarks.push(pid);
                localStorage.setItem('lo_bookmarks', JSON.stringify(window.appState.bookmarks));
                window.renderPosts();
            }
        };
    </script>

    <script>
        const KERNDOELEN = ['Leren bewegen', 'Samen bewegen', 'Betrokken bewegen'];
        const TARGET_GROUPS = ['Leerjaar 1', 'Leerjaar 2', 'Leerjaar 3', 'Leerjaar 4', 'BBL', 'KBL', 'TL'];

        window.appState = {
            posts: JSON.parse(localStorage.getItem('lo_posts')) || [],
            bookmarks: JSON.parse(localStorage.getItem('lo_bookmarks')) || [],
            activeCategory: 'Alle',
            showBookmarksOnly: false,
            currentUser: null,
            chartInstance: null,
            modalSelectedTags: [],
            modalExtraTags: []
        };

        function switchTab(tabId, btn) {
            document.querySelectorAll('.nav-tab').forEach(b => b.className = 'nav-tab text-slate-500 hover:text-kcDark font-medium py-2 px-1');
            btn.className = 'nav-tab active border-b-2 border-kcBlue text-kcBlue font-bold py-2 px-1';
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'stats-tab') renderChart();
        }

        function toggleModal() {
            const m = document.getElementById('postModal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                m.classList.add('flex');
                initModal();
            } else m.classList.remove('flex');
        }

        function initModal() {
            window.appState.modalSelectedTags = [];
            window.appState.modalExtraTags = [];
            
            // Kerndoelen Buttons
            const kd = document.getElementById('modalKerndoelen');
            kd.innerHTML = '';
            KERNDOELEN.forEach(k => {
                const b = document.createElement('button');
                b.type = 'button';
                b.textContent = k;
                b.className = 'px-3 py-1.5 rounded-full border border-slate-200 text-xs font-medium hover:bg-kcPink transition-colors';
                b.onclick = () => {
                    b.classList.toggle('bg-kcBlue');
                    b.classList.toggle('text-white');
                    const idx = window.appState.modalSelectedTags.indexOf(k);
                    if(idx > -1) window.appState.modalSelectedTags.splice(idx, 1);
                    else window.appState.modalSelectedTags.push(k);
                };
                kd.appendChild(b);
            });

            // Target Groups
            const tgc = document.getElementById('target-groups-container');
            tgc.innerHTML = '';
            TARGET_GROUPS.forEach(t => {
                tgc.innerHTML += `<label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 text-xs cursor-pointer hover:bg-slate-50">
                    <input type="checkbox" value="${t}" class="target-chk accent-kcBlue"> ${t}
                </label>`;
            });

            renderModalExtraTags();
        }

        function addNewTag() {
            const input = document.getElementById('newTagInput');
            const val = input.value.trim();
            if(val && !window.appState.modalExtraTags.includes(val)) {
                window.appState.modalExtraTags.push(val);
                renderModalExtraTags();
                input.value = '';
            }
        }

        function renderModalExtraTags() {
            const container = document.getElementById('modalExtraTags');
            container.innerHTML = '';
            window.appState.modalExtraTags.forEach(t => {
                container.innerHTML += `<span class="px-3 py-1.5 rounded-full bg-slate-100 text-kcDark text-xs font-bold border border-slate-200 flex items-center gap-2">
                    ${t} <button type="button" onclick="removeModalTag('${t}')" class="text-kcRed">×</button>
                </span>`;
            });
        }

        function removeModalTag(t) {
            window.appState.modalExtraTags = window.appState.modalExtraTags.filter(x => x !== t);
            renderModalExtraTags();
        }

        function setPresetDuration(v) {
            document.getElementById('postDuration').value = v;
        }

        function adjustDuration(step) {
            const el = document.getElementById('postDuration');
            if(el.value === 'Hele les') { if(step > 0) return; else el.value = '90 min'; }
            let curr = parseInt(el.value) || 0;
            curr = Math.max(5, curr + step);
            el.value = curr + ' min';
        }

        function submitPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title || !content) return alert('Titel en Uitleg zijn verplicht.');

            const tgs = Array.from(document.querySelectorAll('.target-chk:checked')).map(c => c.value);
            const allTags = [...window.appState.modalSelectedTags, ...window.appState.modalExtraTags];

            const post = {
                title, content,
                categories: allTags.length ? allTags : ['Overig'],
                duration: document.getElementById('postDuration').value,
                intensity: document.getElementById('postIntensity').value,
                materials: document.getElementById('postMaterials').value,
                makeEasier: document.getElementById('postEasier').value,
                makeHarder: document.getElementById('postHarder').value,
                safetyInfo: document.getElementById('postSafety').value,
                link: document.getElementById('postLink').value,
                targetGroups: tgs,
                author: document.getElementById('userNameInput').value || 'Collega',
                avatar: (document.getElementById('userNameInput').value || 'C').charAt(0).toUpperCase(),
                createdAt: Date.now(),
                time: new Date().toLocaleDateString('nl-NL'),
                likes: 0
            };

            window.savePostToDb(post);
            toggleModal();
            document.getElementById('newPostForm').reset();
        }

        function renderFilters() {
            const kc = document.getElementById('kerndoelen-container');
            const it = document.getElementById('idee-tags-container');
            kc.innerHTML = '';
            it.innerHTML = '';

            const active = window.appState.activeCategory;

            // Rij 1
            ['Alle', ...KERNDOELEN].forEach(cat => {
                const b = document.createElement('button');
                b.className = `whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors ${active === cat ? 'bg-kcBlue text-white' : 'bg-white border border-slate-200'}`;
                b.textContent = cat;
                b.onclick = () => { window.appState.activeCategory = cat; renderPosts(); };
                kc.appendChild(b);
            });

            // Rij 2 (Gebaseerd op data in posts)
            const usedTags = [...new Set(window.appState.posts.flatMap(p => p.categories || []))].filter(t => !KERNDOELEN.includes(t));
            if(usedTags.length === 0) document.getElementById('idee-tags-section').classList.add('hidden');
            else {
                document.getElementById('idee-tags-section').classList.remove('hidden');
                usedTags.forEach(cat => {
                    const b = document.createElement('button');
                    b.className = `whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors ${active === cat ? 'bg-kcBlue text-white' : 'bg-white border border-slate-200'}`;
                    b.textContent = cat;
                    b.onclick = () => { window.appState.activeCategory = cat; renderPosts(); };
                    it.appendChild(b);
                });
            }
        }

        function getYT(url) {
            if(!url) return null;
            const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (m && m[2].length === 11) ? `https://www.youtube.com/embed/${m[2]}` : null;
        }

        window.renderPosts = function() {
            renderFilters();
            const feed = document.getElementById('feed-container');
            const query = document.getElementById('searchInput').value.toLowerCase();
            feed.innerHTML = '';

            const filtered = window.appState.posts.filter(p => {
                const matchesCat = window.appState.activeCategory === 'Alle' || (p.categories && p.categories.includes(window.appState.activeCategory));
                const matchesSearch = p.title.toLowerCase().includes(query) || p.content.toLowerCase().includes(query);
                const matchesBookmark = window.appState.showBookmarksOnly ? window.appState.bookmarks.includes(p.id) : true;
                return matchesCat && matchesSearch && matchesBookmark;
            });

            if(!filtered.length) {
                feed.innerHTML = '<div class="text-center py-20 opacity-30 text-xl font-bold">Nog geen ideeën gevonden...</div>';
                return;
            }

            filtered.forEach(p => {
                const yt = getYT(p.link);
                const isBookmarked = window.appState.bookmarks.includes(p.id);
                
                feed.innerHTML += `
                <article class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in">
                    <div class="p-4 flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-kcPink text-kcRed font-bold flex items-center justify-center">${p.avatar}</div>
                            <div>
                                <h3 class="font-bold text-sm text-kcDark">${p.author}</h3>
                                <p class="text-[10px] text-slate-400 font-medium">${p.time} • ${p.categories ? p.categories.join(', ') : 'Overig'}</p>
                            </div>
                        </div>
                        <button onclick="toggleBookmarkInDb('${p.id}')" class="p-2 rounded-full hover:bg-kcPink transition-colors">
                            <span class="u-icon" style="color: ${isBookmarked ? '#3A1FEB' : '#cbd5e1'}">🔖</span>
                        </button>
                    </div>
                    <div class="px-4 pb-4 space-y-4">
                        <h2 class="text-xl font-black text-kcDark leading-tight">${p.title}</h2>
                        
                        <div class="flex flex-wrap gap-2">
                            ${p.targetGroups ? p.targetGroups.map(t => `<span class="px-2 py-0.5 bg-kcPink/50 text-kcRed text-[10px] font-bold rounded">${t}</span>`).join('') : ''}
                        </div>

                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs font-bold">
                            <div class="flex items-center gap-1.5"><span class="u-icon text-kcBlue">⏱️</span> ${p.duration || '-'}</div>
                            <div class="flex items-center gap-1.5"><span class="u-icon text-orange-500">🔥</span> ${p.intensity || '-'}</div>
                            <div class="flex items-center gap-1.5 col-span-2 sm:col-span-1"><span class="u-icon text-kcBlue">📦</span> ${p.materials || '-'}</div>
                        </div>

                        <p class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">${p.content}</p>

                        ${p.makeEasier || p.makeHarder || p.safetyInfo ? `
                            <div class="space-y-2 pt-2">
                                ${p.makeEasier ? `<div class="bg-green-50 p-2.5 rounded-lg text-xs text-green-800 border border-green-100"><b>📉 Lichter:</b> ${p.makeEasier}</div>` : ''}
                                ${p.makeHarder ? `<div class="bg-red-50 p-2.5 rounded-lg text-xs text-red-800 border border-red-100"><b>📈 Zwaarder:</b> ${p.makeHarder}</div>` : ''}
                                ${p.safetyInfo ? `<div class="bg-orange-50 p-2.5 rounded-lg text-xs text-orange-800 border border-orange-100"><b>⚠️ Veiligheid:</b> ${p.safetyInfo}</div>` : ''}
                            </div>
                        ` : ''}

                        ${yt ? `<div class="mt-4 relative pt-[56.25%] overflow-hidden rounded-xl border border-slate-200"><iframe src="${yt}" class="absolute inset-0 w-full h-full" frameborder="0" allowfullscreen></iframe></div>` 
                           : p.link ? `<a href="${p.link}" target="_blank" class="block p-3 bg-slate-50 rounded-xl text-kcBlue font-bold text-xs truncate border border-slate-200 hover:bg-kcPink transition-colors">🔗 Link: ${p.link}</a>` : ''}
                    </div>
                </article>`;
            });
        };

        function renderChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const counts = {};
            window.appState.posts.forEach(p => {
                if(p.categories) p.categories.forEach(c => counts[c] = (counts[c] || 0) + 1);
            });
            if(window.appState.chartInstance) window.appState.chartInstance.destroy();
            window.appState.chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#1C2150', '#3A1FEB', '#BF5C62', '#F5DBEC', '#94a3b8', '#cbd5e1'],
                        borderWidth: 2, borderColor: '#fff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold', size: 10 } } } } }
            });
        }

        function toggleBookmarkFilter() {
            window.appState.showBookmarksOnly = !window.appState.showBookmarksOnly;
            const btn = document.getElementById('bookmarkFilterBtn');
            btn.classList.toggle('bg-kcBlue', window.appState.showBookmarksOnly);
            btn.classList.toggle('text-white', window.appState.showBookmarksOnly);
            renderPosts();
        }

        document.getElementById('userNameInput').addEventListener('input', e => {
            const val = e.target.value || 'C';
            document.getElementById('userAvatar').textContent = val.charAt(0).toUpperCase();
            localStorage.setItem('lo_username', e.target.value);
        });

        window.renderPosts();
    </script>
</body>
</html>
